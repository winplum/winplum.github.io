<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script src="./js/mesbd.js"></script>
    <title>我的记事薄</title>
    <link rel="stylesheet" href="./css/mesbd.css">
</head>
<body>
    <div class="main">
		<header class="header">做事不急　事缓则圆</header>
		
		<aside class="leftside"><img class="ark" src="./img/ark3.jpg"><img class="ark" src="./img/ark1.jpg"></aside>
		
		<div class="container">
			<h1>要做的事　别拖延</h1>
			<form id="messageForm">
				<textarea id="messageInput" placeholder="这里输入内容..." style="color: #dc6515"></textarea>
				<button type="submit">保存内容</button>
				<button id="submitButton">显示内容</button>
			</form>
			<div id="messages">
            <!-- 留言将会在这里显示 -->
			</div>
		</div>
		
		<aside class="rightside"><img class="ark" src="./img/ark4.jpg"><img class="ark" src="./img/ark2.jpg"></aside>

		<footer class="footer"></footer>
	</div>
</body>
</html>
